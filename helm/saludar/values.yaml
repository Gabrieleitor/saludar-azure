replicaCount: 2

image:
  repository: ""
  tag: ""
  pullPolicy: Always

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

probes:
  path: /api/saludar/health
  readinessInitialDelaySeconds: 10
  readinessPeriodSeconds: 10
  livenessInitialDelaySeconds: 30
  livenessPeriodSeconds: 20
