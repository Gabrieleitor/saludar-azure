apiVersion: apps/v1
kind: Deployment
metadata:
  name: saludar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: saludar
  template:
    metadata:
      labels:
        app: saludar
    spec:
      containers:
        - name: saludar
          image: miacrprueba.azurecr.io/saludar:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: saludar-service
spec:
  type: LoadBalancer
  selector:
    app: saludar
  ports:
    - port: 80
      targetPort: 8080