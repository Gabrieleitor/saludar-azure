name: CI - Test, build and push image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: saludar

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Gradle wrapper permissions
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_URI=${{ vars.ACR_LOGIN_SERVER }}/${IMAGE_NAME}:${IMAGE_TAG}
          docker build -t ${IMAGE_URI} .
          docker push ${IMAGE_URI}

      - name: Show published image
        run: |
          echo "Imagen publicada:"
          echo "${{ vars.ACR_LOGIN_SERVER }}/${IMAGE_NAME}:${GITHUB_SHA}"
